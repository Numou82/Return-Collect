<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Return Collector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { 
            padding: 20px 10px; 
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Fullscreen Professional Login Wrapper */
        .login-screen-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #111827;
            background-image: 
                radial-gradient(at 0% 0%, rgba(31, 41, 55, 0.5) 0, transparent 50%), 
                radial-gradient(at 50% 0%, rgba(17, 24, 39, 1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(14, 116, 144, 0.15) 0, transparent 50%),
                radial-gradient(at 0% 100%, rgba(15, 23, 42, 1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(15, 118, 110, 0.1) 0, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 15px;
        }

        /* Premium frosted glass container card */
        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }

        .login-card h3 {
            color: #111827;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Mobile-Friendly Custom Dropdown Options */
        .autocomplete-wrapper {
            position: relative;
        }

        .autocomplete-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 200px;
            overflow-y: auto;
            background-color: #fff;
            border: 1px solid #ced4da;
            border-top: none;
            border-radius: 0 0 0.375rem 0.375rem;
            z-index: 9999;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .autocomplete-suggestion {
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
        }

        .autocomplete-suggestion:active, 
        .autocomplete-suggestion:hover {
            background-color: #0e7490;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- LOGIN SECTION -->
    <div id="loginSection" class="login-screen-wrapper">
        <div class="card shadow login-card">
            <h3 class="text-center mb-1">Return Collector</h3>
            <p class="text-center text-muted small mb-4">Please log in to manage return invoices</p>
            
            <div class="mb-3">
                <label class="form-label text-secondary small"><b>User ID (Name):</b></label>
                <input type="text" id="loginId" class="form-control form-control-lg" placeholder="e.g. shahbaz" autocapitalize="none" autocorrect="off" style="font-size: 0.95rem;">
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary small"><b>Password:</b></label>
                <input type="password" id="loginPassword" class="form-control form-control-lg" placeholder="••••••••" style="font-size: 0.95rem;">
            </div>
            <button class="btn btn-primary btn-lg w-100 shadow-sm" onclick="handleLogin()" style="background: #0e7490; border: none; font-size: 1rem; font-weight: 600;">Sign In</button>
        </div>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div id="appContainer" class="container d-none">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="text-light fs-5">Driver: <b id="displayDriverName" class="text-warning"></b></span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
        </div>

        <h2 class="text-center my-3 text-light">Return Invoice Collector</h2>
         
        <div class="card p-3 mb-3">
            <div class="mb-3">
                <label class="form-label"><b>1. Manual Return Invoice No:</b></label>
                <input type="text" id="invoiceNo" class="form-control" placeholder="Enter Invoice Number">
            </div>

            <div class="mb-3">
                <label class="form-label"><b>2. Select Brand:</b></label>
                <select id="brand" class="form-select" onchange="onBrandChange()">
                    <option value="">-- Choose Brand --</option>
                    <option value="Canteen">Canteen</option>
                    <option value="Trolley">Trolley</option>
                </select>
            </div>

            <div class="mb-3 autocomplete-wrapper">
                <label class="form-label"><b>3. Search/Select Branch:</b></label>
                <input type="text" id="branch" class="form-control" placeholder="Type characters to search branch..." oninput="filterBranchOptions()" onfocus="filterBranchOptions()" autocomplete="off">
                <div id="branchSuggestions" class="autocomplete-suggestions"></div>
            </div>
        </div>

        <div class="card p-3 mb-3 text-center">
            <h5><b>4. Fast Scan Barcode</b></h5>
            <div id="reader"></div>
            <input type="text" id="manualBarcode" class="form-control mt-2" placeholder="Or enter barcode manually">
            <button class="btn btn-secondary btn-sm mt-2" onclick="lookupBarcode(document.getElementById('manualBarcode').value)">Lookup Manual Barcode</button>
        </div>

        <div class="card p-3 mb-3">
            <h5><b>Item Details</b></h5>
            <div class="mb-2 autocomplete-wrapper">
                <label>Item Name:</label>
                <input type="text" id="itemName" class="form-control" placeholder="Type characters to search item..." oninput="filterItemOptions()" onfocus="filterItemOptions()" autocomplete="off">
                <div id="itemSuggestions" class="autocomplete-suggestions"></div>
            </div>
            
            <div class="row">
                <div class="col-6 mb-2">
                    <label>Unit Price:</label>
                    <input type="number" id="unitPrice" step="0.001" class="form-control" readonly>
                </div>
                <div class="col-6 mb-2">
                    <label>Qty:</label>
                    <input type="number" id="qty" class="form-control" value="1" min="1">
                </div>
            </div>

            <!-- RETURN REASON OPTION (PLACED DIRECTLY BELOW QTY) -->
            <div class="mb-2">
                <label><b>Return Reason:</b></label>
                <select id="returnReason" class="form-select">
                    <option value="Expired">Expired</option>
                    <option value="Damaged">Damaged</option>
                    <option value="Wrong Item">Wrong Item</option>
                    <option value="Customer Cancelled">Customer Cancelled</option>
                    <option value="Overstock / Excess">Overstock / Excess</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Production Date (Sent Date):</label>
                <input type="date" id="prodDate" class="form-control">
            </div>
            <button class="btn btn-success w-100" onclick="addReturnItem()">Add Item to This Invoice</button>
        </div>

        <div class="card p-3 mb-3">
            <h5>Current Invoice Items</h5>
            <ul id="itemList" class="list-group mb-3"></ul>
            
            <div class="p-3 mb-3 bg-light border rounded d-flex justify-content-between align-items-center">
                <span class="fs-5 text-dark"><b>Current Invoice Total:</b></span>
                <span class="fs-4 text-success"><b>KWD <span id="invoiceTotalDisplay">0.000</span></b></span>
            </div>

            <button class="btn btn-primary w-100" id="saveInvoiceBtn" onclick="saveFullInvoice()">Finalize & Save Invoice</button>
        </div>

        <!-- ADMIN ACTIONS -->
        <div id="adminActions" class="card p-3 border-danger d-none">
            <h5 class="text-danger">Admin Actions (Export Data)</h5>
            <button class="btn btn-dark w-100 mb-2" id="exportBtn" onclick="exportToExcel()">Export All Data to Excel (CSV)</button>
        </div>
    </div>

                    document.getElementById('branchSuggestions').style.display = 'none';
                    document.getElementById('itemSuggestions').style.display = 'none';
                }

            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {

                    applyUserSession(currentUser);

            document.getElementById('displayDriverName').textContent = user.name;
            document.getElementById('loginSection').classList.add('d-none');
            document.getElementById('appContainer').classList.remove('d-none');

            if (user.role === 'admin') {
                document.getElementById('adminActions').classList.remove('d-none');
            } else {
                document.getElementById('adminActions').classList.add('d-none');
            }

            initScanner();
        }

        function handleLogin() {
            const idInput = document.getElementById('loginId').value.trim().toLowerCase();
            const passInput = document.getElementById('loginPassword').value.trim();

            const user = userDatabase[idInput];

            if (user && user.pass === passInput) {
                initAudioContext();
                currentUser = user;

                localStorage.setItem('currentUser', JSON.stringify(user));

                applyUserSession(user);
            } else {
                alert("Invalid User ID or Password!");
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('loginId').value = "";
            document.getElementById('loginPassword').value = "";
            document.getElementById('appContainer').classList.add('d-none');

        // --- AUDIO GENERATOR ---
        let audioCtx = null;
        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeepSound() {
            try {
                initAudioContext();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = "sine";
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.12);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            } catch(e) {
                console.log("Audio feedback failed:", e);
            }
        }

        let currentInvoiceItems = [];
        let html5QrcodeScanner = null;
        let lastScannedBarcode = null;
        let lastScanTime = 0;

        function onBrandChange() {
            resetItemDetails();
            document.getElementById('branch').value = "";
            document.getElementById('branchSuggestions').style.display = "none";
        }

        // --- CUSTOM AUTOCOMPLETE FOR BRANCHES ---
        function filterBranchOptions() {
            const brand = document.getElementById('brand').value;
            const inputVal = document.getElementById('branch').value.toLowerCase();
            const suggestionsContainer = document.getElementById('branchSuggestions');

            if (!brand) {
                alert("Please select a Brand first!");
                document.getElementById('branch').value = "";
                return;
            }

            const branches = branchDatabase[brand] || [];
            const matches = branches.filter(b => b.toLowerCase().includes(inputVal));

            suggestionsContainer.innerHTML = "";
            if (matches.length > 0) {
                matches.forEach(branchName => {
                    const div = document.createElement('div');
                    div.className = 'autocomplete-suggestion';
                    div.textContent = branchName;
                    
                    const selectOption = (e) => {
                        e.preventDefault();
                        document.getElementById('branch').value = branchName;
                        suggestionsContainer.style.display = 'none';
                    };

                    div.addEventListener('touchstart', selectOption);
                    div.addEventListener('click', selectOption);

                    suggestionsContainer.appendChild(div);
                });
                suggestionsContainer.style.display = 'block';
            } else {
                suggestionsContainer.style.display = 'none';
            }
        }

        // --- CUSTOM AUTOCOMPLETE FOR ITEMS ---
        function filterItemOptions() {
            const inputVal = document.getElementById('itemName').value.toLowerCase();
            const suggestionsContainer = document.getElementById('itemSuggestions');
            const brand = document.getElementById('brand').value;

            const items = Object.values(productDatabase).map(i => i.name);
            const matches = items.filter(i => i.toLowerCase().includes(inputVal));

            suggestionsContainer.innerHTML = "";
            if (matches.length > 0 && inputVal.length > 0) {
                matches.forEach(itemName => {
                    const div = document.createElement('div');
                    div.className = 'autocomplete-suggestion';
                    div.textContent = itemName;

                    const selectOption = (e) => {
                        e.preventDefault();
                        if (!brand) {
                            alert("Please select a Brand first to fetch the correct price!");
                            suggestionsContainer.style.display = 'none';
                            return;
                        }
                        document.getElementById('itemName').value = itemName;
                        suggestionsContainer.style.display = 'none';
                        onItemSearchChange(itemName);
                    };

                    div.addEventListener('touchstart', selectOption);
                    div.addEventListener('click', selectOption);

                    suggestionsContainer.appendChild(div);
                });
                suggestionsContainer.style.display = 'block';
            } else {
                suggestionsContainer.style.display = 'none';
            }
        }

        function onItemSearchChange(typedName) {
            const brand = document.getElementById('brand').value;
            const matchedEntry = Object.entries(productDatabase).find(([barcode, data]) => data.name === typedName);
            
            if (matchedEntry) {
                const itemData = matchedEntry[1];
                const price = (brand === "Canteen") ? itemData.canteenPrice : itemData.trolleyPrice;
                document.getElementById('unitPrice').value = price;
                document.getElementById('manualBarcode').value = matchedEntry[0];
            }
        }

        // --- SCANNER LOGIC ---
        function initScanner() {
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 25, qrbox: 250 });
                html5QrcodeScanner.render(onScanSuccess);
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            const now = Date.now();
            if (decodedText === lastScannedBarcode && (now - lastScanTime) < 1200) {
                return; 
            }
            lastScannedBarcode = decodedText;
            lastScanTime = now;

            playBeepSound();
            document.getElementById('manualBarcode').value = decodedText;
            lookupBarcode(decodedText);
        }

        function lookupBarcode(barcode) {
            const brand = document.getElementById('brand').value;
            if (!brand) {
                alert("Please select a Brand (Canteen or Trolley) first!");
                return;
            }

            const cleanBarcode = barcode.trim();
            const item = productDatabase[cleanBarcode];
             
            if (item) {
                document.getElementById('itemName').value = item.name;
                const price = (brand === "Canteen") ? item.canteenPrice : item.trolleyPrice;
                document.getElementById('unitPrice').value = price;
            }
        }

        function resetItemDetails() {
            document.getElementById('itemName').value = "";
            document.getElementById('unitPrice').value = "";
            document.getElementById('manualBarcode').value = "";
            document.getElementById('qty').value = "1";
            document.getElementById('returnReason').value = "Expired";
        }

        function addReturnItem() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('unitPrice').value;
            const qty = document.getElementById('qty').value;
            const reason = document.getElementById('returnReason').value;
            const prodDate = document.getElementById('prodDate').value;

            if (!name || !price || !qty || !prodDate) {
                alert("Please select/scan a valid item, check price/qty, and provide a production date.");
                return;
            }

            const itemData = { 
                name, 
                price: parseFloat(price), 
                qty: parseInt(qty), 
                reason: reason,
                prodDate 
            };
            
            currentInvoiceItems.push(itemData);
             
            updateItemsUI();
            resetItemDetails();
            lastScannedBarcode = null;
        }

        function updateItemsUI() {
            const list = document.getElementById('itemList');
            list.innerHTML = "";
            let runningInvoiceTotal = 0;

            currentInvoiceItems.forEach((item, index) => {
                const totalItemPrice = item.price * item.qty;
                runningInvoiceTotal += totalItemPrice;

                list.innerHTML += `<li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <b>${item.name}</b><br>
                        <small class="text-muted">Prod Date: ${item.prodDate} | Qty: ${item.qty} | Reason: <b class="text-dark">${item.reason}</b> @ KWD ${item.price.toFixed(3)}</small>
                    </div>
                    <div class="text-end">
                        <span><b>KWD ${totalItemPrice.toFixed(3)}</b></span><br>
                        <button class="btn btn-sm btn-link text-danger p-0" style="font-size:0.8rem;" onclick="removeItemFromInvoice(${index})">Remove</button>
                    </div>
                </li>`;
            });

            document.getElementById('invoiceTotalDisplay').textContent = runningInvoiceTotal.toFixed(3);
        }

        function removeItemFromInvoice(index) {
            currentInvoiceItems.splice(index, 1);
            updateItemsUI();
        }

        // --- CENTRAL CLOUD UPLOAD VIA GOOGLE APPS SCRIPT ---
        function saveFullInvoice() {
            const invoiceNo = document.getElementById('invoiceNo').value;
            const brand = document.getElementById('brand').value;
            const branch = document.getElementById('branch').value;

            if (!invoiceNo || !brand || !branch || currentInvoiceItems.length === 0) {
                alert("Please fill Invoice No, Brand, Branch, and add at least one item.");
                return;
            }

            const saveBtn = document.getElementById('saveInvoiceBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = "Uploading Data to Cloud...";

            let payload = [];
            const now = new Date();
            
            // Format clean strings for date & time
            const dateStr = now.getFullYear() + "-" + 
                            String(now.getMonth() + 1).padStart(2, '0') + "-" + 
                            String(now.getDate()).padStart(2, '0');
            const timeStr = now.toLocaleTimeString('en-US', { hour12: true });

            currentInvoiceItems.forEach(item => {
                payload.push({
                    driverName: currentUser ? currentUser.name : "Unknown",
                    returnDate: dateStr,
                    productionDate: item.prodDate,
                    scanTime: timeStr,
                    invoiceNo: invoiceNo,
                    brand: brand,
                    branch: branch,
                    itemName: item.name,
                    unitPrice: item.price,
                    qty: item.qty,
                    returnReason: item.reason,
                    totalPrice: (item.price * item.qty).toFixed(3)
                });
            });

            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("Invoice Saved & Synced Centralized Online Successfully!");
                currentInvoiceItems = [];
                document.getElementById('invoiceNo').value = "";
                document.getElementById('branch').value = ""; 
                document.getElementById('itemList').innerHTML = "";
                document.getElementById('invoiceTotalDisplay').textContent = "0.000";
                resetItemDetails();
                lastScannedBarcode = null;
            })
            .catch(err => {
                alert("Error sending data to server. Check your connection.");
                console.error(err);
            })
            .finally(() => {
                saveBtn.disabled = false;
                saveBtn.textContent = "Finalize & Save Invoice";
            });
        }
    </script>
</body>
</html>
