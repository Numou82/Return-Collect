<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Return Collector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { 
            padding: 20px 10px; 
            /* Dark Slate Gradient */
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .login-card {
            max-width: 400px;
            margin: 50px auto;
        }
    </style>
</head>
<body>

    <!-- LOGIN SECTION -->
    <div id="loginSection" class="card p-4 shadow login-card">
        <h3 class="text-center mb-3">Login</h3>
        <div class="mb-3">
            <label class="form-label"><b>User ID (Name):</b></label>
            <input type="text" id="loginId" class="form-control" placeholder="Enter ID (e.g. Shahbaz)">
        </div>
        <div class="mb-3">
            <label class="form-label"><b>Password:</b></label>
            <input type="password" id="loginPassword" class="form-control" placeholder="Enter Password">
        </div>
        <button class="btn btn-primary w-100" onclick="handleLogin()">Login</button>
    </div>

    <!-- MAIN APP CONTAINER (Hidden until login) -->
    <div id="appContainer" class="container d-none">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="text-light fs-5">Driver: <b id="displayDriverName" class="text-warning"></b></span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
        </div>

        <h2 class="text-center my-3 text-light">Return Invoice Collector</h2>
         
        <div class="card p-3 mb-3">
            <div class="mb-3">
                <label class="form-label"><b>1. Manual Return Invoice No:</b></label>
                <input type="text" id="invoiceNo" class="form-control" placeholder="Enter Invoice Number">
            </div>

            <div class="mb-3">
                <label class="form-label"><b>2. Select Brand:</b></label>
                <select id="brand" class="form-select" onchange="onBrandChange()">
                    <option value="">-- Choose Brand --</option>
                    <option value="Canteen">Canteen</option>
                    <option value="Trolley">Trolley</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label"><b>3. Search/Select Branch:</b></label>
                <!-- FIXED: Explicit connection mapping attributes -->
                <input type="text" id="branch" class="form-control" placeholder="Type characters to search branch..." list="branchOptions">
                <datalist id="branchOptions"></datalist>
            </div>
        </div>

        <div class="card p-3 mb-3 text-center">
            <h5><b>4. Fast Scan Barcode</b></h5>
            <div id="reader"></div>
            <input type="text" id="manualBarcode" class="form-control mt-2" placeholder="Or enter barcode manually">
            <button class="btn btn-secondary btn-sm mt-2" onclick="lookupBarcode(document.getElementById('manualBarcode').value)">Lookup Manual Barcode</button>
        </div>

        <div class="card p-3 mb-3">
            <h5><b>Item Details</b></h5>
            <div class="mb-2">
                <label>Item Name:</label>
                <!-- FIXED: Listening properly to change event when clicking a selection drop option -->
                <input type="text" id="itemName" class="form-control" placeholder="Type characters to search item..." list="itemOptions" onchange="onItemSearchChange()" oninput="onItemSearchChange()">
                <datalist id="itemOptions"></datalist>
            </div>
            <div class="row">
                <div class="col-6 mb-2">
                    <label>Unit Price:</label>
                    <input type="number" id="unitPrice" step="0.001" class="form-control" readonly>
                </div>
                <div class="col-6 mb-2">
                    <label>Qty:</label>
                    <input type="number" id="qty" class="form-control" value="1">
                </div>
            </div>
            <div class="mb-3">
                <label>Production Date (Sent Date):</label>
                <input type="date" id="prodDate" class="form-control">
            </div>
            <button class="btn btn-success w-100" onclick="addReturnItem()">Add Item to This Invoice</button>
        </div>

        <div class="card p-3 mb-3">
            <h5>Current Invoice Items</h5>
            <ul id="itemList" class="list-group mb-3"></ul>
            <button class="btn btn-primary w-100" onclick="saveFullInvoice()">Finalize & Save Invoice</button>
        </div>

        <!-- ADMIN ACTIONS (Hidden for Drivers) -->
        <div id="adminActions" class="card p-3 border-danger d-none">
            <h5 class="text-danger">Admin Actions (Export Data)</h5>
            <button class="btn btn-dark w-100 mb-2" onclick="exportToExcel()">Export All Data to Excel (CSV)</button>
            <button class="btn btn-danger btn-sm w-100" onclick="clearDatabase()">Clear Saved Data</button>
        </div>
    </div>

    <script>
        // --- AUTHENTICATION & USER MANAGEMENT ---
        const userDatabase = {
            "shahbaz": { name: "Shahbaz", pass: "1234", role: "driver" },
            "abdullah": { name: "Abdullah", pass: "1234", role: "driver" },
            "rashid": { name: "Rashid", pass: "1234", role: "driver" },
            "admin": { name: "Amir khan", pass: "admin123", role: "admin" }
        };

        let currentUser = null;

        function handleLogin() {
            const idInput = document.getElementById('loginId').value.trim().toLowerCase();
            const passInput = document.getElementById('loginPassword').value.trim();

            const user = userDatabase[idInput];

            if (user && user.pass === passInput) {
                initAudioContext();

                currentUser = user;
                document.getElementById('displayDriverName').textContent = user.name;
                document.getElementById('loginSection').classList.add('d-none');
                document.getElementById('appContainer').classList.remove('d-none');

                if (user.role === 'admin') {
                    document.getElementById('adminActions').classList.remove('d-none');
                } else {
                    document.getElementById('adminActions').classList.add('d-none');
                }

                initScanner();
            } else {
                alert("Invalid User ID or Password!");
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('loginId').value = "";
            document.getElementById('loginPassword').value = "";
            document.getElementById('appContainer').classList.add('d-none');
            document.getElementById('loginSection').classList.remove('d-none');
        }

        // --- SUPERMARKET BEEP AUDIO GENERATOR ---
        let audioCtx = null;
        
        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeepSound() {
            try {
                initAudioContext();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                 
                osc.type = "sine";
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime); 
                 
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.12);
                 
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                 
                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            } catch(e) {
                console.log("Audio feedback failed:", e);
            }
        }

        // --- BRANCHES DATABASE ---

        };

        let currentInvoiceItems = [];
        let html5QrcodeScanner = null;
        let lastScannedBarcode = null;
        let lastScanTime = 0;

        window.addEventListener('DOMContentLoaded', () => {
            // FIXED: Populate search bar list container completely on start
            const itemOptions = document.getElementById('itemOptions');
            itemOptions.innerHTML = "";
            const uniqueItems = new Set();
            Object.values(productDatabase).forEach(item => uniqueItems.add(item.name));
            uniqueItems.forEach(itemName => {
                const option = document.createElement('option');
                option.value = itemName;
                itemOptions.appendChild(option);
            });

            document.body.addEventListener('click', () => {
                initAudioContext();
            }, { once: false });
        });

        function onBrandChange() {
            resetItemDetails();
            const brandSelect = document.getElementById('brand').value;
            const branchInput = document.getElementById('branch');
            const branchOptions = document.getElementById('branchOptions');
             
            branchInput.value = "";
            branchOptions.innerHTML = "";

            if (brandSelect && branchDatabase[brandSelect]) {
                branchDatabase[brandSelect].forEach(branchName => {
                    const option = document.createElement('option');
                    option.value = branchName;
                    branchOptions.appendChild(option);
                });
            }
        }

        // FIXED: Re-mapped extraction logic to trigger properly during active manual string match selections
        function onItemSearchChange() {
            const typedName = document.getElementById('itemName').value.trim();
            const brand = document.getElementById('brand').value;
            
            if (typedName === "") return;

            if (!brand) {
                alert("Please select a Brand first to fetch the correct price!");
                document.getElementById('itemName').value = "";
                return;
            }

            const matchedEntry = Object.entries(productDatabase).find(([barcode, data]) => data.name === typedName);
            if (matchedEntry) {
                const itemData = matchedEntry[1];
                const price = (brand === "Canteen") ? itemData.canteenPrice : itemData.trolleyPrice;
                document.getElementById('unitPrice').value = price;
                document.getElementById('manualBarcode').value = matchedEntry[0];
            }
        }

        // --- FAST SCANNER LOGIC ---
        function initScanner() {
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 25, qrbox: 250 });
                html5QrcodeScanner.render(onScanSuccess);
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            const now = Date.now();
            if (decodedText === lastScannedBarcode && (now - lastScanTime) < 1200) {
                return; 
            }

            lastScannedBarcode = decodedText;
            lastScanTime = now;

            playBeepSound();
            document.getElementById('manualBarcode').value = decodedText;
            lookupBarcode(decodedText);
        }

        function lookupBarcode(barcode) {
            const brand = document.getElementById('brand').value;
            if (!brand) {
                alert("Please select a Brand (Canteen or Trolley) first!");
                return;
            }

            const cleanBarcode = barcode.trim();
            const item = productDatabase[cleanBarcode];
             
            if (item) {
                document.getElementById('itemName').value = item.name;
                const price = (brand === "Canteen") ? item.canteenPrice : item.trolleyPrice;
                document.getElementById('unitPrice').value = price;
            } else {
                console.log("Product not found: " + cleanBarcode);
            }
        }

        function resetItemDetails() {
            document.getElementById('itemName').value = "";
            document.getElementById('unitPrice').value = "";
            document.getElementById('manualBarcode').value = "";
            document.getElementById('qty').value = "1";
        }

        function addReturnItem() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('unitPrice').value;
            const qty = document.getElementById('qty').value;
            const prodDate = document.getElementById('prodDate').value;

            if (!name || !price || !qty || !prodDate) {
                alert("Please select/scan a valid item, ensure price/quantity is set, and select a production date.");
                return;
            }

            const itemData = { name, price: parseFloat(price), qty: parseInt(qty), prodDate };
            currentInvoiceItems.push(itemData);
             
            updateItemsUI();
            resetItemDetails();
            lastScannedBarcode = null;
        }

        function updateItemsUI() {
            const list = document.getElementById('itemList');
            list.innerHTML = "";
            currentInvoiceItems.forEach((item, index) => {
                const totalItemPrice = (item.price * item.qty).toFixed(3);
                list.innerHTML += `<li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <b>${item.name}</b><br>
                        <small class="text-muted">Prod Date: ${item.prodDate} | Qty: ${item.qty} @ KWD ${item.price.toFixed(3)}</small>
                    </div>
                    <span><b>KWD ${totalItemPrice}</b></span>
                </li>`;
            });
        }

        function saveFullInvoice() {
            const invoiceNo = document.getElementById('invoiceNo').value;
            const brand = document.getElementById('brand').value;
            const branch = document.getElementById('branch').value;

            if (!invoiceNo || !brand || !branch || currentInvoiceItems.length === 0) {
                alert("Please fill Invoice No, Brand, Branch, and add at least one item.");
                return;
            }

            let allSavedReturns = JSON.parse(localStorage.getItem('returned_invoices')) || [];

            currentInvoiceItems.forEach(item => {
                allSavedReturns.push({
                    driverName: currentUser ? currentUser.name : "Unknown",
                    invoiceNo,
                    brand,
                    branch,
                    itemName: item.name,
                    unitPrice: item.price,
                    qty: item.qty,
                    productionDate: item.prodDate,
                    scanTimestamp: new Date().toLocaleString()
                });
            });

            localStorage.setItem('returned_invoices', JSON.stringify(allSavedReturns));
             
            alert("Invoice Saved Successfully Offline!");
             
            currentInvoiceItems = [];
            document.getElementById('invoiceNo').value = "";
            document.getElementById('itemList').innerHTML = "";
            resetItemDetails();
            lastScannedBarcode = null;
        }

        function exportToExcel() {
            const data = JSON.parse(localStorage.getItem('returned_invoices')) || [];
            if (data.length === 0) {
                alert("No data available to export.");
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Driver Name,Return Date,Production Date,Scan Time,Invoice No,Brand,Branch,Item Name,Unit Price,Qty,Total Price\n";

            data.forEach(row => {
                const total = (row.unitPrice * row.qty).toFixed(3);
                 
                const timeParts = row.scanTimestamp ? row.scanTimestamp.split(',') : ['', ''];
                const returnDate = timeParts[0] ? timeParts[0].trim() : '';
                const scanTime = timeParts[1] ? timeParts[1].trim() : row.scanTimestamp;
                const driver = row.driverName || "N/A";

                const line = `"${driver}","${returnDate}","${row.productionDate}","${scanTime}","${row.invoiceNo}","${row.brand}","${row.branch}","${row.itemName}",${row.unitPrice},${row.qty},${total}`;
                csvContent += line + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Return_Invoices_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function clearDatabase() {
            if (confirm("Are you sure you want to clear ALL saved records? Make sure you exported first!")) {
                localStorage.removeItem('returned_invoices');
                alert("Database cleared.");
            }
        }
    </script>
