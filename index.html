    let audioCtx = null;
    function initAudioContext() {
        if (!audioCtx) {

        }
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playBeepSound() {
        try {
            initAudioContext();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "sine";
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.12);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        } catch(e) {
            console.log("Audio feedback failed:", e);
        }
    }

    // --- CUSTOM AUTOCOMPLETE FOR BRANCHES ---
    function filterBranchOptions() {
        const brand = document.getElementById('brand').value;
        const inputVal = document.getElementById('branch').value.toLowerCase();
        const suggestionsContainer = document.getElementById('branchSuggestions');

        if (!brand) {
            alert("Please select a Brand first!");
            document.getElementById('branch').value = "";
            return;
        }

        const branches = branchDatabase[brand] || [];
        const matches = branches.filter(b => b.toLowerCase().includes(inputVal));

        suggestionsContainer.innerHTML = "";
        if (matches.length > 0) {
            matches.forEach(branchName => {
                const div = document.createElement('div');
                div.className = 'autocomplete-suggestion';
                div.textContent = branchName;
                
                const selectOption = (e) => {
                    e.preventDefault();
                    document.getElementById('branch').value = branchName;
                    suggestionsContainer.style.display = 'none';
                };

                div.addEventListener('touchstart', selectOption);
                div.addEventListener('click', selectOption);

                suggestionsContainer.appendChild(div);
            });
            suggestionsContainer.style.display = 'block';
        } else {
            suggestionsContainer.style.display = 'none';
        }
    }

    // --- CUSTOM AUTOCOMPLETE FOR ITEMS ---
    function filterItemOptions() {
        const inputVal = document.getElementById('itemName').value.toLowerCase();
        const suggestionsContainer = document.getElementById('itemSuggestions');
        const brand = document.getElementById('brand').value;

        const items = Object.values(productDatabase).map(i => i.name);
        const matches = items.filter(i => i.toLowerCase().includes(inputVal));

        suggestionsContainer.innerHTML = "";
        if (matches.length > 0 && inputVal.length > 0) {
            matches.forEach(itemName => {
                const div = document.createElement('div');
                div.className = 'autocomplete-suggestion';
                div.textContent = itemName;

                const selectOption = (e) => {
                    e.preventDefault();
                    if (!brand) {
                        alert("Please select a Brand first to fetch the correct price!");
                        suggestionsContainer.style.display = 'none';
                        return;
                    }
                    document.getElementById('itemName').value = itemName;
                    suggestionsContainer.style.display = 'none';
                    onItemSearchChange(itemName);
                };

                div.addEventListener('touchstart', selectOption);
                div.addEventListener('click', selectOption);

                suggestionsContainer.appendChild(div);
            });
            suggestionsContainer.style.display = 'block';
        } else {
            suggestionsContainer.style.display = 'none';
        }
    }

    function onItemSearchChange(typedName) {
        const brand = document.getElementById('brand').value;
        const matchedEntry = Object.entries(productDatabase).find(([barcode, data]) => data.name === typedName);
        
        if (matchedEntry) {
            const itemData = matchedEntry[1];
            const price = (brand === "Canteen") ? itemData.canteenPrice : itemData.trolleyPrice;
            document.getElementById('unitPrice').value = price;
            document.getElementById('manualBarcode').value = matchedEntry[0];
        }
    }

    // --- SCANNER LOGIC ---
    function initScanner() {
        if (!html5QrcodeScanner) {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 25, qrbox: 250 });
            html5QrcodeScanner.render(onScanSuccess);
        }
    }

    function onScanSuccess(decodedText, decodedResult) {
        const now = Date.now();
        if (decodedText === lastScannedBarcode && (now - lastScanTime) < 1200) {
            return; 
        }
        lastScannedBarcode = decodedText;
        lastScanTime = now;

        playBeepSound();
        document.getElementById('manualBarcode').value = decodedText;
        lookupBarcode(decodedText);
    }

    function lookupBarcode(barcode) {
        const brand = document.getElementById('brand').value;
        if (!brand) {
            alert("Please select a Brand (Canteen or Trolley) first!");
            return;
        }

        const cleanBarcode = barcode.trim();
        const item = productDatabase[cleanBarcode];
         
        if (item) {
            document.getElementById('itemName').value = item.name;
            const price = (brand === "Canteen") ? item.canteenPrice : item.trolleyPrice;
            document.getElementById('unitPrice').value = price;
        }
    }

    function resetItemDetails() {
        document.getElementById('itemName').value = "";
        document.getElementById('unitPrice').value = "";
        document.getElementById('manualBarcode').value = "";
        document.getElementById('qty').value = "1";
    }

    function addReturnItem() {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('unitPrice').value;
        const qty = document.getElementById('qty').value;
        const prodDate = document.getElementById('prodDate').value;

        if (!name || !price || !qty || !prodDate) {
            alert("Please select/scan a valid item, check price/qty, and provide a production date.");
            return;
        }

        const itemData = { name, price: parseFloat(price), qty: parseInt(qty), prodDate };
        currentInvoiceItems.push(itemData);
         
        updateItemsUI();
        resetItemDetails();
        lastScannedBarcode = null;
    }

    function updateItemsUI() {
        const list = document.getElementById('itemList');
        list.innerHTML = "";
        let runningInvoiceTotal = 0;

        currentInvoiceItems.forEach((item, index) => {
            const totalItemPrice = item.price * item.qty;
            runningInvoiceTotal += totalItemPrice;

            list.innerHTML += `<li class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <b>${item.name}</b><br>
                    <small class="text-muted">Prod Date: ${item.prodDate} | Qty: ${item.qty} @ KWD ${item.price.toFixed(3)}</small>
                </div>
                <div class="text-end">
                    <span><b>KWD ${totalItemPrice.toFixed(3)}</b></span><br>
                    <button class="btn btn-sm btn-link text-danger p-0" style="font-size:0.8rem;" onclick="removeItemFromInvoice(${index})">Remove</button>
                </div>
            </li>`;
        });

        document.getElementById('invoiceTotalDisplay').textContent = runningInvoiceTotal.toFixed(3);
    }

    function removeItemFromInvoice(index) {
        currentInvoiceItems.splice(index, 1);
        updateItemsUI();
    }

    // --- CENTRAL CLOUD UPLOAD VIA GOOGLE APPS SCRIPT ---
    function saveFullInvoice() {
        const invoiceNo = document.getElementById('invoiceNo').value;
        const brand = document.getElementById('brand').value;
        const branch = document.getElementById('branch').value;

        if (!invoiceNo || !brand || !branch || currentInvoiceItems.length === 0) {
            alert("Please fill Invoice No, Brand, Branch, and add at least one item.");
            return;
        }

        const saveBtn = document.getElementById('saveInvoiceBtn');
        saveBtn.disabled = true;
        saveBtn.textContent = "Uploading Data to Cloud...";

        let payload = [];
        const now = new Date();
        const dateStr = now.toLocaleDateString();
        const timeStr = now.toLocaleTimeString();

        currentInvoiceItems.forEach(item => {
            payload.push({
                driverName: currentUser ? currentUser.name : "Unknown",
                returnDate: dateStr,
                productionDate: item.prodDate,
                scanTime: timeStr,
                invoiceNo: invoiceNo,
                brand: brand,
                branch: branch,
                itemName: item.name,
                unitPrice: item.price,
                qty: item.qty,
                totalPrice: (item.price * item.qty).toFixed(3)
            });
        });

        fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert("Invoice Saved & Synced Centralized Online Successfully!");
            currentInvoiceItems = [];
            document.getElementById('invoiceNo').value = "";
            document.getElementById('branch').value = ""; 
            document.getElementById('itemList').innerHTML = "";
            document.getElementById('invoiceTotalDisplay').textContent = "0.000";
            resetItemDetails();
            lastScannedBarcode = null;
        })
        .catch(err => {
            alert("Error sending data to server. Check your connection.");
            console.error(err);
        })
        .finally(() => {
            saveBtn.disabled = false;
            saveBtn.textContent = "Finalize & Save Invoice";
        });
    }

    // --- ADMIN DOWNLOAD EXCEL DATA ---
    function exportToExcel() {
        const exportBtn = document.getElementById('exportBtn');
        exportBtn.disabled = true;
        exportBtn.textContent = "Fetching Server Records...";

        fetch(GOOGLE_SCRIPT_URL)
            .then(response => response.json())
            .then(data => {
                if (!data || data.length === 0) {
                    alert("No data available to export.");
                    return;
                }

                let csvContent = "data:text/csv;charset=utf-8,";
                data.forEach(row => {
                    const line = row.map(e => `"${String(e).replace(/"/g, '""')}"`).join(",");
                    csvContent += line + "\n";
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `All_Drivers_Return_Invoices_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            })
            .catch(err => {
                console.error(err);
                alert("Failed to export data. Please make sure Google Apps Script is correctly configured.");
            })
            .finally(() => {
                exportBtn.disabled = false;
                exportBtn.textContent = "Export All Data to Excel (CSV)";
            });
    }
